name: Compiler Gokusensi IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Node.js et Cordova
      run: npm install -g cordova

    - name: Créer le projet iOS Cordova et Configurer l'Icône
      run: |
        # 1. Création du projet initial
        cordova create goku-app com.gokusensi.shop "GokuSensei"
        cd goku-app
        
        # 2. Création du répertoire pour accueillir les assets de l'icône
        mkdir -p res/icon/ios
        
        # 3. Téléchargement de ton image de base depuis Catbox
        curl -L "https://files.catbox.moe/pukmfj.jpg" -o res/icon/ios/base.jpg
        
        # 4. Génération de toutes les dimensions d'icônes obligatoires pour iOS au format PNG
        sips -z 1024 1024 res/icon/ios/base.jpg --out res/icon/ios/icon-1024.png
        sips -z 180 180   res/icon/ios/base.jpg --out res/icon/ios/icon-60@3x.png
        sips -z 120 120   res/icon/ios/base.jpg --out res/icon/ios/icon-60@2x.png
        sips -z 76 76     res/icon/ios/base.jpg --out res/icon/ios/icon-76.png
        sips -z 152 152   res/icon/ios/base.jpg --out res/icon/ios/icon-76@2x.png
        sips -z 167 167   res/icon/ios/base.jpg --out res/icon/ios/icon-83.5@2x.png
        sips -z 40 40     res/icon/ios/base.jpg --out res/icon/ios/icon-40.png
        sips -z 80 80     res/icon/ios/base.jpg --out res/icon/ios/icon-40@2x.png
        sips -z 120 120   res/icon/ios/base.jpg --out res/icon/ios/icon-40@3x.png
        sips -z 57 57     res/icon/ios/base.jpg --out res/icon/ios/icon.png
        sips -z 114 114   res/icon/ios/base.jpg --out res/icon/ios/icon@2x.png
        sips -z 29 29     res/icon/ios/base.jpg --out res/icon/ios/icon-small.png
        sips -z 58 58     res/icon/ios/base.jpg --out res/icon/ios/icon-small@2x.png
        sips -z 87 87     res/icon/ios/base.jpg --out res/icon/ios/icon-small@3x.png
        sips -z 50 50     res/icon/ios/icon-small.png --out res/icon/ios/icon-50.png
        sips -z 100 100   res/icon/ios/icon-small@2x.png --out res/icon/ios/icon-50@2x.png
        
        # Nettoyage du fichier JPG temporaire
        rm res/icon/ios/base.jpg

        # 5. Injection propre des balises de navigation et de toutes les icônes dans config.xml via Node.js
        node -e "
          const fs = require('fs');
          let config = fs.readFileSync('config.xml', 'utf8');
          
          const iosIconsConfig = '  <allow-navigation href=\"https://gokusensi.com/*\" />\n' +
            '  <platform name=\"ios\">\n' +
            '    <icon src=\"res/icon/ios/icon-1024.png\" width=\"1024\" height=\"1024\" />\n' +
            '    <icon src=\"res/icon/ios/icon-60@3x.png\" width=\"180\" height=\"180\" />\n' +
            '    <icon src=\"res/icon/ios/icon-60@2x.png\" width=\"120\" height=\"120\" />\n' +
            '    <icon src=\"res/icon/ios/icon-76.png\" width=\"76\" height=\"76\" />\n' +
            '    <icon src=\"res/icon/ios/icon-76@2x.png\" width=\"152\" height=\"152\" />\n' +
            '    <icon src=\"res/icon/ios/icon-83.5@2x.png\" width=\"167\" height=\"167\" />\n' +
            '    <icon src=\"res/icon/ios/icon-40.png\" width=\"40\" height=\"40\" />\n' +
            '    <icon src=\"res/icon/ios/icon-40@2x.png\" width=\"80\" height=\"80\" />\n' +
            '    <icon src=\"res/icon/ios/icon-40@3x.png\" width=\"120\" height=\"120\" />\n' +
            '    <icon src=\"res/icon/ios/icon.png\" width=\"57\" height=\"57\" />\n' +
            '    <icon src=\"res/icon/ios/icon@2x.png\" width=\"114\" height=\"114\" />\n' +
            '    <icon src=\"res/icon/ios/icon-small.png\" width=\"29\" height=\"29\" />\n' +
            '    <icon src=\"res/icon/ios/icon-small@2x.png\" width=\"58\" height=\"58\" />\n' +
            '    <icon src=\"res/icon/ios/icon-small@3x.png\" width=\"87\" height=\"87\" />\n' +
            '    <icon src=\"res/icon/ios/icon-50.png\" width=\"50\" height=\"50\" />\n' +
            '    <icon src=\"res/icon/ios/icon-50@2x.png\" width=\"100\" height=\"100\" />\n' +
            '  </platform>\n</widget>';
          
          config = config.replace('</widget>', iosIconsConfig);
          fs.writeFileSync('config.xml', config);
        "

    - name: Injecter l'interface (Spinner + Offline + SW)
      run: |
        cd goku-app/www
        
        # --- INJECTION DE INDEX.HTML (ANIMATION ANIME.JS) ---
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html lang="fr">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>GokuSenseiz | Chargement</title>
            <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;900&display=swap" rel="stylesheet">
            <style>
                :root { --bg: #030303; --accent: #ffffff; --z-color: #ff3333; }
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body {
                    background-color: var(--bg);
                    background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #030303 100%);
                    margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
                    font-family: 'Outfit', sans-serif; overflow: hidden;
                }
                .wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 100%; max-width: 600px; padding: 20px; }
                .title-js { display: flex; gap: 15px; will-change: gap; }
                .letter {
                    position: relative; font-size: 8.5vw; font-weight: 900; color: transparent;
                    -webkit-text-stroke: 1px rgba(255, 255, 255, 0.15); text-transform: uppercase;
                    display: inline-block; opacity: 0;
                }
                @media (min-width: 768px) { .letter { font-size: 4.5rem; } }
                .letter::before {
                    content: attr(data-char); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                    color: var(--accent); -webkit-text-stroke: 0px transparent; clip-path: inset(0 100% 0 0); transition: none;
                }
                .z-char { -webkit-text-stroke: 1px rgba(255, 51, 51, 0.4); }
                .z-char::before { color: var(--z-color); filter: drop-shadow(0 0 10px rgba(255, 51, 51, 0.6)); }
                .scan-line {
                    position: absolute; top: -20%; bottom: -20%; left: 0; width: 3px; background: #fff;
                    box-shadow: 0 0 20px #fff, 0 0 40px var(--z-color); opacity: 0; pointer-events: none; z-index: 10;
                }
            </style>
        </head>
        <body>
            <div class="wrapper">
                <div class="scan-line" id="scanner"></div>
                <div class="title-js" id="title">
                    <span class="letter" data-char="G">G</span>
                    <span class="letter" data-char="O">O</span>
                    <span class="letter" data-char="K">K</span>
                    <span class="letter" data-char="U">U</span>
                    <span class="letter" data-char="S">S</span>
                    <span class="letter" data-char="E">E</span>
                    <span class="letter" data-char="N">N</span>
                    <span class="letter" data-char="S">S</span>
                    <span class="letter" data-char="E">E</span>
                    <span class="letter" data-char="I">I</span>
                    <span class="letter z-char" data-char="Z">Z</span>
                </div>
            </div>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
            <script>
                const tl = anime.timeline();
                tl.add({ targets: '.letter', opacity: [0, 1], scale: [1.5, 1], rotateY: [-30, 0], filter: ['blur(10px)', 'blur(0px)'], duration: 700, delay: anime.stagger(40), easing: 'easeOutExpo' });
                tl.add({ targets: '#title', gap: ['15px', '2px'], duration: 800, easing: 'cubicBezier(0.25, 1, 0.5, 1)' }, '-=600');
                const styleUpdate = document.createElement('style');
                document.head.appendChild(styleUpdate);
                tl.add({
                    targets: '.letter',
                    update: (anim) => {
                        let cssRules = '';
                        document.querySelectorAll('.letter').forEach((el, i) => {
                            const delayFactor = i * 6;
                            let val = 100 - (anim.progress * 1.4) + delayFactor;
                            val = Math.min(100, Math.max(0, val));
                            cssRules += `.letter:nth-child(${i+1})::before { clip-path: inset(0 ${val}% 0 0); }\n`;
                        });
                        styleUpdate.innerHTML = cssRules;
                    },
                    duration: 700, easing: 'linear'
                }, '-=800');
                tl.add({ targets: '#scanner', left: ['-5%', '105%'], opacity: [0, 1, 1, 0], duration: 700, easing: 'easeInOutQuad' }, '-=700');
                tl.add({ targets: '.z-char', scale: [1, 1.25, 1], filter: ['brightness(1)', 'brightness(2.2)', 'brightness(1)'], duration: 450, easing: 'easeOutQuad' }, '-=200');
            </script>
            <script>
                if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js"); }
                window.onload = () => {
                    setTimeout(() => {
                        window.location.href = navigator.onLine ? "https://gokusensi.com" : "offline.html";
                    }, 1500);
                };
            </script>
        </body>
        </html>
        EOF

        # --- INJECTION DE OFFLINE.HTML (ASTRONAUTE PREMIUM) ---
        cat << 'EOF' > offline.html
        <!DOCTYPE html>
        <html lang="fr">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>Signal Perdu | GokuSenseiz</title>
            <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <style>
                :root { --bg: #030303; --surface: #0a0a0a; --card-bg: #000000; --border: rgba(255, 255, 255, 0.08); --accent: #ffffff; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
                * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
                body { background-color: var(--bg); color: white; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #030303 80%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
                .lost-container { max-width: 450px; width: 100%; background: var(--card-bg); border: 1px solid var(--border); border-radius: 35px; padding: 40px 30px; text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); }
                .logo { font-size: 1.4rem; font-weight: 800; margin-bottom: 35px; letter-spacing: -0.5px; }
                .logo span { color: #555; }
                @keyframes floatSpace { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(4deg); } 100% { transform: translateY(0px) rotate(0deg); } }
                .svg-wrapper { width: 200px; height: 200px; margin: 0 auto 30px; animation: floatSpace 6s ease-in-out infinite; }
                h1 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
                p { color: #666; font-size: 0.9rem; margin-bottom: 35px; }
                .btn-reconnect { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: #111; color: white; padding: 16px; border-radius: 18px; font-weight: 800; border: 1px solid var(--border); cursor: pointer; transition: var(--transition); }
                .btn-reconnect:hover { background: white; color: black; }
                .btn-reconnect.loading .fa-spinner { display: inline-block; animation: spin 0.8s linear infinite; }
                .btn-reconnect .fa-spinner { display: none; }
                @keyframes spin { to { transform: rotate(360deg); } }
            </style>
        </head>
        <body>
            <div class="lost-container">
                <div class="logo">Goku<span>Senseiz.</span></div>
                <div class="svg-wrapper">
                    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                        <circle cx="100" cy="100" r="85" stroke="rgba(255,255,255,0.03)" stroke-width="2" stroke-dasharray="6 6"/>
                        <circle cx="35" cy="45" r="4" fill="#555" />
                        <path d="M70 125C70 115 80 105 100 105C120 105 130 115 130 125V160H70V125Z" fill="#0f0f0f" stroke="var(--border)" stroke-width="2"/>
                        <circle cx="100" cy="80" r="42" fill="#0a0a0a" stroke="var(--border)" stroke-width="2.5"/>
                        <path d="M70 82C70 65 80 54 100 54C120 54 130 65 130 82C130 92 122 102 100 102C78 102 70 92 70 82Z" fill="#000000" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
                    </svg>
                </div>
                <h1>Hors ligne</h1>
                <p>La connexion avec GokuSenseiz a été interrompue.<br>Veuillez vérifier votre accès réseau.</p>
                <button class="btn-reconnect" id="btnReconnect" onclick="triggerRetry()">
                    <i class="fa-solid fa-spinner"></i>
                    <span class="btn-text">Réessayer</span>
                </button>
            </div>
            <script>
                function triggerRetry() {
                    const btn = document.getElementById('btnReconnect');
                    btn.classList.add('loading');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
                }
            </script>
        </body>
        </html>
        EOF

        # --- SERVICE WORKER (SW.JS) ---
        cat << 'EOF' > sw.js
        const CACHE_NAME = 'goku-v1';
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['offline.html', 'index.html']))));
        self.addEventListener('fetch', e => {
            if (e.request.mode === 'navigate') e.respondWith(fetch(e.request).catch(() => caches.match('offline.html')));
        });
        EOF

    - name: Ajouter la plateforme iOS
      run: |
        cd goku-app
        cordova platform add ios

    - name: Compiler l'application (.app)
      run: |
        cd goku-app/platforms/ios
        SCHEME_NAME="App"
        PROJECT_NAME="App.xcodeproj"
        xcodebuild -project "$PROJECT_NAME" \
          -scheme "$SCHEME_NAME" \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          -derivedDataPath "build_output" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          clean build

    - name: Créer le fichier .IPA
      run: |
        mkdir -p ${{ github.workspace }}/ipa/Payload
        APP_PATH=$(find goku-app/platforms/ios/build_output -name "*.app" -type d | head -n 1)
        cp -R "$APP_PATH" ${{ github.workspace }}/ipa/Payload/
        cd ${{ github.workspace }}/ipa
        zip -r ${{ github.workspace }}/GokuSensiz.ipa .

    - name: Télécharger l'IPA
      uses: actions/upload-artifact@v4
      with:
        name: GokuSensiz-IPA
        path: ${{ github.workspace }}/GokuSensiz.ipa
