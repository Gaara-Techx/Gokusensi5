name: Compiler Gokusensi APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Configurer Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurer le SDK Android
      uses: android-actions/setup-android@v3

    - name: Installer Node.js et Cordova
      run: npm install -g cordova

    - name: Créer le projet et Configurer les visuels (Icône + Splash)
      run: |
        cordova create goku-app com.gokusensi.shop "GokuSensei"
        cd goku-app
        
        # Création des dossiers de ressources
        mkdir -p res/icon/android
        mkdir -p res/screen/android
        
        # Téléchargement de ton image
        curl -L "https://files.catbox.moe/pukmfj.jpg" -o res/icon/android/icon.jpg
        cp res/icon/android/icon.jpg res/screen/android/splash.jpg

        # Injection de la config pour supprimer le logo Cordova par défaut
        node -e "
          const fs = require('fs');
          let config = fs.readFileSync('config.xml', 'utf8');
          
          const visualConfig = '  <allow-navigation href=\"https://gokusensi.com/*\" />\n' +
            '  <platform name=\"android\">\n' +
            '    <icon src=\"res/icon/android/icon.jpg\" />\n' +
            '    <preference name=\"SplashScreen\" value=\"screen\" />\n' +
            '    <preference name=\"SplashMaintainAspectRatio\" value=\"true\" />\n' +
            '    <splash src=\"res/screen/android/splash.jpg\" />\n' +
            '  </platform>\n</widget>';
          
          config = config.replace('</widget>', visualConfig);
          fs.writeFileSync('config.xml', config);
        "

    - name: Injecter l'interface (Glassmorphism)
      run: |
        cd goku-app/www
        # (Le code HTML/CSS reste identique à tes versions précédentes)
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html lang="fr">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <style>
                body { background: #030303; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
                .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; text-align: center; }
            </style>
        </head>
        <body>
            <div class="glass"><h1>GokuSenseiz</h1><p>Chargement...</p></div>
            <script>setTimeout(() => { window.location.href = "https://gokusensi.com"; }, 2000);</script>
        </body>
        </html>
        EOF

    - name: Ajouter la plateforme Android
      run: |
        cd goku-app
        cordova platform add android

    - name: Compiler l'APK
      run: |
        cd goku-app
        cordova build android --device

    - name: Télécharger l'APK
      uses: actions/upload-artifact@v4
      with:
        name: GokuSensiz-APK
        path: goku-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
